name: Terraform CI/CD with Workspaces

on:
  push:
    branches:
      - main

jobs:
  terraform-dev-staging:
    runs-on: self-hosted

    strategy:
      matrix:
        workspace: [dev, staging]

    defaults:
      run:
        working-directory: environments

    steps:
      - uses: actions/checkout@v3
      - uses: hashicorp/setup-terraform@v2

        name: Setup Terraform
      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      - run: terraform init
      - run: terraform workspace select ${{ matrix.workspace }} || terraform workspace new ${{ matrix.workspace }}
      - run: terraform fmt -check -recursive
      - run: terraform validate
      - run: terraform plan -out=tfplan
      - run: terraform apply -auto-approve tfplan   # auto-apply for dev & staging

  terraform-prod:
    runs-on: self-hosted
    environment: production    

    defaults:
      run:
        working-directory: environments

    steps:
      - uses: actions/checkout@v3
      - uses: hashicorp/setup-terraform@v2

        name: Setup Terraform
      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      - run: terraform init
      - run: terraform workspace select prod || terraform workspace new prod
      - run: terraform fmt -check -recursive
      - run: terraform validate
      - run: terraform plan -out=tfplan
      - run: terraform apply -auto-approve tfplan   # will run **after manual approval**