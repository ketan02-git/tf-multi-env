name: Terraform CI/CD with Workspaces

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: self-hosted

    strategy:
      matrix:
        workspace: [dev, staging, prod]

    defaults:
      run:
        working-directory: environments  # avoids repeating cd

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-south-1

      - name: Terraform Init
        run: terraform init

      - name: Select Workspace
        run: terraform workspace select ${{ matrix.workspace }} || terraform workspace new ${{ matrix.workspace }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var="ami=ami-0f5ee92e2d63afc18" -out=tfplan

      - name: Terraform Apply
        if: matrix.workspace != 'prod'
        run: terraform apply -auto-approve tfplan

      - name: Terraform Apply Prod (manual approval)
        if: matrix.workspace == 'prod'
        environment: production   # requires manual approval in GitHub
        run: terraform apply -auto-approve tfplan